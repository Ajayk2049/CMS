syntax = "proto3";

package device;

service DeviceService {
  rpc RegisterDevice (RegisterDeviceRequest) returns (RegisterDeviceResponse);
  rpc SendHeartbeat (HeartbeatRequest) returns (HeartbeatResponse);
  rpc TrackAdImpression (AdImpressionRequest) returns (AdImpressionResponse);
}

message RegisterDeviceRequest {
  string deviceId = 1;
  string deviceType = 2; // tablet, screen
  string hostApplicationId = 3;
}

message RegisterDeviceResponse {
  bool success = 1;
  string message = 2;
  string status = 3; // online, offline
}

message HeartbeatRequest {
  string deviceId = 1;
}

message HeartbeatResponse {
  bool success = 1;
  string command = 2; // e.g. reload, reboot, normal
}

message AdImpressionRequest {
  string deviceId = 1;
  string bookingId = 2;
  int32 durationSeconds = 3;
  int32 interactiveClicks = 4; // tablet only
}

message AdImpressionResponse {
  bool success = 1;
  string message = 2;
}
